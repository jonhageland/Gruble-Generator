<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruble Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Gruble Generator</h1>
        <p class="subtitle">Bokstav & Kategori-velger</p>

        <div class="display-section">
            <div class="card">
                <span class="label">Bokstav</span>
                <div id="letter-display" class="main-display">-</div>
            </div>
            
            <div class="card">
                <span class="label">Kategori</span>
                <div id="category-display" class="main-display category-text">Trykk Start!</div>
            </div>
        </div>

        <button id="spin-button">Trill terningen! 🎲</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
